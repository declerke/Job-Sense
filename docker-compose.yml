version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-jobsense}:${POSTGRES_PASSWORD:-jobsense_secret}@postgres:5432/${POSTGRES_DB:-jobsense}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY:-}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-jobsense_secret}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__LOGGING__LOGGING_LEVEL: WARNING
    PYTHONPATH: /opt/airflow/jobsense
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: ${POSTGRES_DB:-jobsense}
    POSTGRES_USER: ${POSTGRES_USER:-jobsense}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobsense_secret}
    ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
    ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
    - .:/opt/airflow/jobsense
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - jobsense_net

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobsense}
      POSTGRES_USER: ${POSTGRES_USER:-jobsense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobsense_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./setup/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobsense} -d ${POSTGRES_DB:-jobsense}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobsense_net

  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - >-
        airflow db migrate &&
        airflow users create -u admin -p admin -f Admin -l User -r Admin -e admin@jobsense.local || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-jobsense}
      POSTGRES_USER: ${POSTGRES_USER:-jobsense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobsense_secret}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jobsense_net
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0
    environment:
      API_BASE_URL: http://api:8000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-jobsense}
      POSTGRES_USER: ${POSTGRES_USER:-jobsense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobsense_secret}
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    depends_on:
      - api
    networks:
      - jobsense_net
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_logs:

networks:
  jobsense_net:
    driver: bridge
